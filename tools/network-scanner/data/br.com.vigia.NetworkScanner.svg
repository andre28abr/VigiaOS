<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="44%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Radar concept: central node + rings + scan nodes -->
  <g transform="translate(128 128)">
    <!-- Concentric rings -->
    <circle cx="0" cy="0" r="64" fill="none"
            stroke="#34d399" stroke-width="1.5" stroke-opacity="0.35"/>
    <circle cx="0" cy="0" r="48" fill="none"
            stroke="#34d399" stroke-width="1.5" stroke-opacity="0.45"/>
    <circle cx="0" cy="0" r="32" fill="none"
            stroke="#34d399" stroke-width="1.8" stroke-opacity="0.6"/>

    <!-- Scan sweep (cone) -->
    <path d="M 0 0 L 60 -34 A 70 70 0 0 1 70 -10 Z"
          fill="#34d399"
          fill-opacity="0.18"
          stroke="#34d399"
          stroke-width="2"
          stroke-opacity="0.6"
          stroke-linejoin="round"/>

    <!-- Discovered nodes -->
    <g fill="#34d399">
      <circle cx="56" cy="-24" r="5.5"/>
      <circle cx="-50" cy="22" r="5.5"/>
      <circle cx="32" cy="46" r="5.5"/>
      <circle cx="-30" cy="-44" r="5.5"/>
    </g>
    <!-- Discovered nodes — inner highlight -->
    <g fill="#09090b">
      <circle cx="56" cy="-24" r="2"/>
      <circle cx="-50" cy="22" r="2"/>
      <circle cx="32" cy="46" r="2"/>
      <circle cx="-30" cy="-44" r="2"/>
    </g>

    <!-- Connection lines from center to nodes -->
    <g stroke="#34d399" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="2 3">
      <line x1="0" y1="0" x2="56" y2="-24"/>
      <line x1="0" y1="0" x2="-50" y2="22"/>
      <line x1="0" y1="0" x2="32" y2="46"/>
      <line x1="0" y1="0" x2="-30" y2="-44"/>
    </g>

    <!-- Center node — origin -->
    <circle cx="0" cy="0" r="10" fill="#09090b" stroke="#fafafa" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="4" fill="#fafafa"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 232)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="12" letter-spacing="3"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>NETSCAN</text>
  </g>
</svg>
