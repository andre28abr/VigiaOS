<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="42%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Dashboard panels: 4 mini-charts -->
  <g transform="translate(48 56)">
    <!-- Top-left panel: line chart (CPU emerald) -->
    <rect x="0" y="0" width="68" height="48" rx="6"
          fill="#09090b" stroke="#34d399" stroke-width="2"/>
    <polyline points="6,38 14,32 22,28 30,22 38,30 46,18 54,24 62,14"
              fill="none" stroke="#34d399" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="62" cy="14" r="2.5" fill="#34d399"/>

    <!-- Top-right panel: bar chart (RAM amber) -->
    <rect x="80" y="0" width="68" height="48" rx="6"
          fill="#09090b" stroke="#fbbf24" stroke-width="2"/>
    <g fill="#fbbf24">
      <rect x="88" y="28" width="6" height="14" rx="1"/>
      <rect x="98" y="22" width="6" height="20" rx="1"/>
      <rect x="108" y="14" width="6" height="28" rx="1"/>
      <rect x="118" y="20" width="6" height="22" rx="1"/>
      <rect x="128" y="10" width="6" height="32" rx="1"/>
      <rect x="138" y="16" width="6" height="26" rx="1"/>
    </g>

    <!-- Bottom-left panel: arc (disk cyan) -->
    <rect x="0" y="62" width="68" height="48" rx="6"
          fill="#09090b" stroke="#22d3ee" stroke-width="2"/>
    <!-- Arc background -->
    <path d="M 12 100 A 22 22 0 1 1 56 100"
          fill="none" stroke="#22d3ee" stroke-width="3"
          stroke-opacity="0.25" stroke-linecap="round"/>
    <!-- Arc fill ~65% -->
    <path d="M 12 100 A 22 22 0 0 1 50 78"
          fill="none" stroke="#22d3ee" stroke-width="3"
          stroke-linecap="round"/>
    <text x="34" y="98" text-anchor="middle"
          font-family="JetBrains Mono, monospace"
          font-size="10" font-weight="700"
          fill="#22d3ee">65%</text>

    <!-- Bottom-right panel: area chart (net violet) -->
    <rect x="80" y="62" width="68" height="48" rx="6"
          fill="#09090b" stroke="#a78bfa" stroke-width="2"/>
    <!-- Area shape -->
    <path d="M 86 102 L 94 96 L 102 88 L 110 92 L 118 84 L 126 78 L 134 86 L 142 76 L 142 104 L 86 104 Z"
          fill="#a78bfa" fill-opacity="0.25"
          stroke="#a78bfa" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 232)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="12" letter-spacing="3"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>DASH</text>
  </g>
</svg>
