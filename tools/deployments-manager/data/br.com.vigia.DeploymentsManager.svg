<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Pilha de snapshots (3 retangulos sobrepostos com offset Y) -->
  <g transform="translate(128 130)">
    <!-- Snapshot mais antigo (de baixo, mais escuro) -->
    <rect x="-58" y="20" width="116" height="34" rx="6"
          fill="#09090b"
          stroke="#34d399"
          stroke-width="2.5"
          stroke-opacity="0.4"/>
    <line x1="-46" y1="32" x2="46" y2="32" stroke="#34d399" stroke-width="2" stroke-opacity="0.4"/>
    <line x1="-46" y1="42" x2="20" y2="42" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.3"/>

    <!-- Snapshot medio -->
    <rect x="-58" y="-12" width="116" height="34" rx="6"
          fill="#09090b"
          stroke="#34d399"
          stroke-width="2.5"
          stroke-opacity="0.65"/>
    <line x1="-46" y1="0" x2="46" y2="0" stroke="#34d399" stroke-width="2" stroke-opacity="0.65"/>
    <line x1="-46" y1="10" x2="30" y2="10" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- Snapshot atual (mais brilhante, com indicador ATIVO) -->
    <rect x="-58" y="-44" width="116" height="34" rx="6"
          fill="#09090b"
          stroke="#34d399"
          stroke-width="3"/>
    <line x1="-46" y1="-32" x2="46" y2="-32" stroke="#fafafa" stroke-width="2.5"/>
    <line x1="-46" y1="-22" x2="36" y2="-22" stroke="#fafafa" stroke-width="2" stroke-opacity="0.7"/>

    <!-- Dot indicador ATIVO (esquerda do retangulo atual) -->
    <circle cx="-68" cy="-27" r="4" fill="#34d399"/>

    <!-- Seta de rollback (volta pra deployment anterior) -->
    <g transform="translate(72 -20)" stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 0 0 L -6 8 L 0 16"/>
      <path d="M -6 8 L 20 8" stroke-opacity="0.7"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 230)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="10" letter-spacing="2"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>DEPLOY</text>
  </g>
</svg>
