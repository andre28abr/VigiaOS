<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Globo com meridianos + ponto central -->
  <g transform="translate(128 122)">
    <!-- Circulo externo (globo) -->
    <circle r="60" fill="none"
            stroke="#fafafa" stroke-width="2.5"
            stroke-opacity="0.85"/>
    <!-- Meridianos verticais (elipses) -->
    <ellipse cx="0" cy="0" rx="25" ry="60" fill="none"
             stroke="#fafafa" stroke-width="1.8"
             stroke-opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="45" ry="60" fill="none"
             stroke="#fafafa" stroke-width="1.8"
             stroke-opacity="0.4"/>
    <!-- Paralelos horizontais -->
    <line x1="-60" y1="0" x2="60" y2="0"
          stroke="#fafafa" stroke-width="2"
          stroke-opacity="0.6"/>
    <line x1="-55" y1="-26" x2="55" y2="-26"
          stroke="#fafafa" stroke-width="1.5"
          stroke-opacity="0.4"/>
    <line x1="-55" y1="26" x2="55" y2="26"
          stroke="#fafafa" stroke-width="1.5"
          stroke-opacity="0.4"/>

    <!-- Cadeado emerald no centro (indica encriptado / DoT) -->
    <g transform="translate(0 -2)">
      <!-- Arco -->
      <path d="M -8 0 Q -8 -10, 0 -10 Q 8 -10, 8 0"
            fill="none"
            stroke="#34d399" stroke-width="2.5"
            stroke-linecap="round"/>
      <!-- Corpo -->
      <rect x="-11" y="0" width="22" height="16" rx="3"
            fill="#34d399"
            fill-opacity="0.2"
            stroke="#34d399"
            stroke-width="2.5"/>
      <!-- Furo -->
      <circle cx="0" cy="8" r="2" fill="#34d399"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 230)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="13" letter-spacing="4"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>DNS</text>
  </g>
</svg>
