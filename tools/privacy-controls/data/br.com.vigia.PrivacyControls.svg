<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Padlock body -->
  <g transform="translate(128 144)">
    <rect x="-50" y="-20" width="100" height="80" rx="10"
          fill="#34d399" stroke="#fafafa" stroke-width="3"/>
    <!-- Shackle -->
    <path d="M -32 -20 L -32 -50 A 32 32 0 0 1 32 -50 L 32 -20"
          fill="none" stroke="#fafafa" stroke-width="10" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cy="10" r="8" fill="#09090b"/>
    <rect x="-3" y="10" width="6" height="22" fill="#09090b" rx="2"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 230)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="20" letter-spacing="6"
     fill="#fafafa" opacity="0.85">
    <text>VIGIA<tspan fill="#34d399">·</tspan>PRIVACY</text>
  </g>
</svg>
