<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Vigia Hub symbolic icon: shield + eye (vigilancia, security) -->
  <!-- Designed pra GNOME shell topbar — usa fill currentColor pra herdar
       a cor do tema (light/dark agnostic) -->
  <g fill="currentColor">
    <!-- Outer shield outline -->
    <path d="M 8 1 L 2.5 3 L 2.5 7.5 C 2.5 11 5 13.5 8 15 C 11 13.5 13.5 11 13.5 7.5 L 13.5 3 Z M 8 2.2 L 12.3 3.7 L 12.3 7.5 C 12.3 10.3 10.3 12.5 8 13.7 C 5.7 12.5 3.7 10.3 3.7 7.5 L 3.7 3.7 Z" fill-rule="evenodd"/>
    <!-- Inner eye: oval + pupil -->
    <ellipse cx="8" cy="7.5" rx="2.5" ry="1.5" fill="none" stroke="currentColor" stroke-width="0.6"/>
    <circle cx="8" cy="7.5" r="0.9"/>
  </g>
</svg>
