<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Magnifier + crosshair "looking for hidden" -->
  <g transform="translate(128 122)">
    <!-- Crosshair (background, subtle) -->
    <g stroke="#34d399" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round">
      <line x1="-80" y1="0" x2="-48" y2="0"/>
      <line x1="48" y1="0" x2="80" y2="0"/>
      <line x1="0" y1="-80" x2="0" y2="-48"/>
      <line x1="0" y1="48" x2="0" y2="80"/>
    </g>

    <!-- Magnifier circle (outer ring) -->
    <circle cx="-8" cy="-8" r="42"
            fill="#09090b"
            stroke="#34d399"
            stroke-width="6"/>

    <!-- Magnifier inner glow -->
    <circle cx="-8" cy="-8" r="35"
            fill="#34d399"
            fill-opacity="0.06"/>

    <!-- Hidden process indicator inside lens (eye shape) -->
    <g transform="translate(-8 -8)">
      <!-- Eye outline -->
      <ellipse cx="0" cy="0" rx="18" ry="11"
               fill="none"
               stroke="#fafafa"
               stroke-width="2.5"
               stroke-opacity="0.85"/>
      <!-- Pupil (rootkit eye watching!) -->
      <circle cx="0" cy="0" r="6" fill="#fafafa"/>
      <circle cx="0" cy="0" r="3" fill="#09090b"/>
      <!-- Tiny highlight -->
      <circle cx="2" cy="-1.5" r="1" fill="#fafafa"/>
    </g>

    <!-- Magnifier handle (diagonal, lower-right) -->
    <line x1="22" y1="22" x2="48" y2="48"
          stroke="#34d399"
          stroke-width="8"
          stroke-linecap="round"/>

    <!-- Detection dots (suspeitos detectados — vermelho sutil) -->
    <g fill="#f87171" fill-opacity="0.7">
      <circle cx="-72" cy="-58" r="2.5"/>
      <circle cx="68" cy="-62" r="2"/>
      <circle cx="-62" cy="62" r="2"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 230)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="11" letter-spacing="2.5"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>ROOTKIT</text>
  </g>
</svg>
