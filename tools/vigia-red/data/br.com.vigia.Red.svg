<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- VigiaRed — olho-vigia com pupila vermelha + crosshair (red team / alvo). -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Crosshair -->
  <g stroke="#ef4444" stroke-width="6" stroke-linecap="round" opacity="0.9">
    <line x1="128" y1="34" x2="128" y2="60"/>
    <line x1="128" y1="196" x2="128" y2="222"/>
    <line x1="34" y1="128" x2="60" y2="128"/>
    <line x1="196" y1="128" x2="222" y2="128"/>
  </g>

  <!-- Eye com pupila vermelha -->
  <g transform="translate(128 128)">
    <ellipse rx="78" ry="46" fill="none" stroke="#fafafa" stroke-width="7"/>
    <circle r="30" fill="#fafafa"/>
    <circle r="13" fill="#ef4444"/>
    <circle cx="-5" cy="-5" r="4" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
