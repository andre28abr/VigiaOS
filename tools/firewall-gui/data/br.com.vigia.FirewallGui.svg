<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Brick wall (motivo firewall) -->
  <g transform="translate(48 70)">
    <!-- linha 1 -->
    <rect x="0"   y="0"  width="50" height="22" rx="3" fill="#34d399" opacity="0.9"/>
    <rect x="55"  y="0"  width="50" height="22" rx="3" fill="#34d399" opacity="0.9"/>
    <rect x="110" y="0"  width="50" height="22" rx="3" fill="#34d399" opacity="0.9"/>
    <!-- linha 2 (offset) -->
    <rect x="-25" y="27" width="50" height="22" rx="3" fill="#34d399" opacity="0.7"/>
    <rect x="30"  y="27" width="50" height="22" rx="3" fill="#34d399" opacity="0.7"/>
    <rect x="85"  y="27" width="50" height="22" rx="3" fill="#34d399" opacity="0.7"/>
    <rect x="140" y="27" width="22" height="22" rx="3" fill="#34d399" opacity="0.7"/>
    <!-- linha 3 -->
    <rect x="0"   y="54" width="50" height="22" rx="3" fill="#34d399" opacity="0.9"/>
    <rect x="55"  y="54" width="50" height="22" rx="3" fill="#34d399" opacity="0.9"/>
    <rect x="110" y="54" width="50" height="22" rx="3" fill="#34d399" opacity="0.9"/>
  </g>

  <!-- Pequeno escudo overlay no centro -->
  <g transform="translate(128 130)">
    <path d="M 0 -10 L -22 -2 L -22 14 Q -22 28, 0 36 Q 22 28, 22 14 L 22 -2 Z"
          fill="#fafafa" stroke="#09090b" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 230)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="16" letter-spacing="6"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>FIREWALL</text>
  </g>
</svg>
