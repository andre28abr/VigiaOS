<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Lupa (magnifier) com checks dentro -->
  <g transform="translate(122 116)">
    <!-- Cabo da lupa (atras) -->
    <line x1="40" y1="40" x2="68" y2="68"
          stroke="#fafafa" stroke-width="9"
          stroke-linecap="round"
          stroke-opacity="0.85"/>

    <!-- Circulo da lupa -->
    <circle r="44" fill="#09090b"
            stroke="#fafafa" stroke-width="5"
            stroke-opacity="0.85"/>

    <!-- 3 linhas dentro da lupa: 2 "permissoes" emerald + 1 amber (alerta) -->
    <g stroke-width="4" stroke-linecap="round" fill="none">
      <!-- Linha 1: check emerald (permissao normal) -->
      <path d="M -22 -16 L -14 -8 L -2 -22" stroke="#34d399"/>
      <line x1="6" y1="-16" x2="22" y2="-16"
            stroke="#34d399" stroke-opacity="0.7"/>

      <!-- Linha 2: check emerald -->
      <path d="M -22 0 L -14 8 L -2 -6" stroke="#34d399"/>
      <line x1="6" y1="0" x2="22" y2="0"
            stroke="#34d399" stroke-opacity="0.7"/>

      <!-- Linha 3: 'X' amber (capability suspeita / risco alto) -->
      <g stroke="#dc2626">
        <line x1="-22" y1="10" x2="-12" y2="20"/>
        <line x1="-12" y1="10" x2="-22" y2="20"/>
      </g>
      <line x1="-4" y1="16" x2="22" y2="16"
            stroke="#dc2626" stroke-opacity="0.7"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 230)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="11" letter-spacing="3"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>CAPABILITIES</text>
  </g>
</svg>
