<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="42%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Document + hash output -->
  <g transform="translate(128 128)">
    <!-- Document (file) -->
    <g transform="translate(-44 -50)">
      <!-- Doc body -->
      <path d="M 0 0 L 56 0 L 76 20 L 76 96 Q 76 100, 72 100 L 4 100 Q 0 100, 0 96 Z"
            fill="#09090b"
            stroke="#fafafa"
            stroke-width="2.5"
            stroke-opacity="0.7"
            stroke-linejoin="round"/>
      <!-- Folded corner -->
      <path d="M 56 0 L 76 20 L 56 20 Z"
            fill="#fafafa" fill-opacity="0.1"
            stroke="#fafafa" stroke-width="2.5" stroke-opacity="0.7"/>
      <!-- Content lines -->
      <g stroke="#fafafa" stroke-width="2" stroke-opacity="0.55" stroke-linecap="round">
        <line x1="10" y1="40" x2="60" y2="40"/>
        <line x1="10" y1="50" x2="50" y2="50"/>
        <line x1="10" y1="60" x2="64" y2="60"/>
        <line x1="10" y1="70" x2="44" y2="70"/>
      </g>
    </g>

    <!-- Arrow indicating hash function -->
    <g transform="translate(0 0)">
      <path d="M 36 0 L 56 0"
            stroke="#34d399" stroke-width="3"
            stroke-linecap="round"/>
      <!-- Hash function box -->
      <rect x="38" y="-10" width="20" height="20" rx="3"
            fill="#34d399" fill-opacity="0.18"
            stroke="#34d399" stroke-width="2"/>
      <text x="48" y="4" text-anchor="middle"
            font-family="JetBrains Mono, monospace"
            font-size="10" font-weight="700"
            fill="#34d399">#</text>
    </g>

    <!-- Hash output (digest) -->
    <g transform="translate(44 -50)">
      <rect x="0" y="0" width="60" height="100" rx="4"
            fill="#09090b"
            stroke="#34d399"
            stroke-width="2.5"/>
      <!-- Hex blocks indicando digest -->
      <g fill="#34d399">
        <rect x="6" y="10" width="14" height="6" rx="1"/>
        <rect x="22" y="10" width="10" height="6" rx="1"/>
        <rect x="34" y="10" width="18" height="6" rx="1"/>

        <rect x="6" y="22" width="10" height="6" rx="1"/>
        <rect x="18" y="22" width="16" height="6" rx="1"/>
        <rect x="36" y="22" width="14" height="6" rx="1"/>

        <rect x="6" y="34" width="18" height="6" rx="1"/>
        <rect x="26" y="34" width="10" height="6" rx="1"/>
        <rect x="38" y="34" width="12" height="6" rx="1"/>

        <rect x="6" y="46" width="14" height="6" rx="1"/>
        <rect x="22" y="46" width="16" height="6" rx="1"/>
        <rect x="40" y="46" width="10" height="6" rx="1"/>

        <rect x="6" y="58" width="10" height="6" rx="1"/>
        <rect x="18" y="58" width="14" height="6" rx="1"/>
        <rect x="34" y="58" width="16" height="6" rx="1"/>

        <rect x="6" y="70" width="18" height="6" rx="1"/>
        <rect x="26" y="70" width="12" height="6" rx="1"/>
        <rect x="40" y="70" width="10" height="6" rx="1"/>

        <rect x="6" y="82" width="14" height="6" rx="1"/>
        <rect x="22" y="82" width="10" height="6" rx="1"/>
        <rect x="34" y="82" width="16" height="6" rx="1"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 232)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="12" letter-spacing="3"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>HASH</text>
  </g>
</svg>
