<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Documento estilizado -->
  <g transform="translate(128 122)">
    <!-- Folha (com canto dobrado) -->
    <path d="M -46 -64
             L 30 -64
             L 50 -44
             L 50 64
             L -46 64 Z"
          fill="#fafafa" fill-opacity="0.06"
          stroke="#fafafa" stroke-width="2.5"
          stroke-opacity="0.85"
          stroke-linejoin="round"/>
    <!-- Dobra do canto -->
    <path d="M 30 -64 L 30 -44 L 50 -44"
          fill="none"
          stroke="#fafafa" stroke-width="2.5"
          stroke-opacity="0.6"
          stroke-linejoin="round"/>

    <!-- Linhas de texto -->
    <g stroke="#fafafa" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.55">
      <line x1="-32" y1="-24" x2="36" y2="-24"/>
      <line x1="-32" y1="-10" x2="20" y2="-10"/>
      <line x1="-32" y1="4" x2="32" y2="4"/>
    </g>

    <!-- Mini-grafico de barras emerald -->
    <g fill="#34d399">
      <rect x="-32" y="42" width="8" height="14"/>
      <rect x="-20" y="32" width="8" height="24"/>
      <rect x="-8"  y="20" width="8" height="36"/>
      <rect x="4"   y="36" width="8" height="20"/>
      <rect x="16"  y="26" width="8" height="30"/>
      <rect x="28"  y="40" width="8" height="16"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(128 230)" text-anchor="middle"
     font-family="JetBrains Mono, ui-monospace, monospace"
     font-weight="700" font-size="14" letter-spacing="5"
     fill="#fafafa" opacity="0.9">
    <text>VIGIA<tspan fill="#34d399">·</tspan>REPORTS</text>
  </g>
</svg>
