<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Vigia Activity Log — olho (motivo Vigia) acima de linhas de log
       (entradas de atividade: bullet emerald + linha). Sem wordmark. -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="42%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <rect width="256" height="256" rx="48" fill="url(#glow)"/>

  <!-- Eye -->
  <g transform="translate(128 90)">
    <ellipse rx="62" ry="37" fill="none" stroke="#fafafa" stroke-width="6"/>
    <circle r="21" fill="#fafafa"/>
    <circle r="8.5" fill="#34d399"/>
    <circle cx="-4" cy="-4" r="3" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- Linhas de log: bullet emerald + barra branca de largura variavel -->
  <g stroke-linecap="round">
    <g fill="#34d399">
      <circle cx="54" cy="166" r="6.5"/>
      <circle cx="54" cy="195" r="6.5"/>
      <circle cx="54" cy="224" r="6.5"/>
    </g>
    <g stroke="#fafafa" stroke-width="11" opacity="0.92">
      <line x1="78" y1="166" x2="206" y2="166"/>
      <line x1="78" y1="195" x2="178" y2="195"/>
      <line x1="78" y1="224" x2="198" y2="224"/>
    </g>
  </g>
</svg>
