<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!-- Base zinc-950 -->
  <rect width="1920" height="1080" fill="#09090b"/>

  <!-- Subtle diagonal gradient overlay for depth -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#g)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Centered watcher eye (very subtle, low opacity) -->
  <g transform="translate(960 480)" opacity="0.06" fill="none" stroke="#fafafa" stroke-width="2">
    <ellipse rx="220" ry="120"/>
    <circle r="60"/>
    <circle r="20" fill="#34d399" stroke="none" opacity="1"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(960 720)" text-anchor="middle"
     font-family="JetBrainsMono Nerd Font, JetBrains Mono, ui-monospace, monospace"
     font-weight="500" letter-spacing="6" fill="#fafafa">
    <text font-size="56">VIGIA<tspan fill="#34d399">·</tspan>OS</text>
    <text y="40" font-size="14" opacity="0.4" letter-spacing="4">SECURITY · LGPD · AUDIT</text>
  </g>
</svg>
