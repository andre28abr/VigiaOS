---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/andre28abr/vigiaos
name: vigiaos
description: Fedora Atomic personalizada (aarch64) — seguranca, LGPD, auditoria, escritorio. Tema escuro.

# Base oficial Fedora Silverblue (tem manifesto aarch64).
# Trocar 44 quando migrar major version manualmente.
base-image: quay.io/fedora-ostree-desktops/silverblue
image-version: 44

modules:
  # 1) Copia arquivos estáticos para dentro da imagem.
  #    files/system/* vira / no sistema final.
  - type: files
    files:
      - source: system
        destination: /

  # 2) Pacotes RPM (atômicos, parte da base do ostree).
  - type: dnf
    install:
      packages:
        # Mínimo para validar o pipeline. Stack de segurança/auditoria
        # entra em iterações seguintes para manter este primeiro build leve.
        - micro
        - htop
        - tmux

  # 3) Flatpaks pré-instalados para todos os usuários do sistema.
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.github.tchx84.Flatseal
      - scope: user
