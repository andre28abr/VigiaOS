---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/andre28abr/vigiaos
name: vigiaos
description: Fedora Atomic personalizada (aarch64) — seguranca, LGPD, auditoria, escritorio. Tema escuro.

# Base oficial Fedora Silverblue (tem manifesto aarch64).
base-image: quay.io/fedora-ostree-desktops/silverblue
image-version: 44

modules:
  # 1) Copia arquivos estaticos para dentro da imagem.
  #    files/system/* vira / no sistema final.
  - type: files
    files:
      - source: system
        destination: /

  # 2) Pacotes RPM (atomicos, parte da base do ostree).
  - type: dnf
    install:
      packages:
        # Terminal/produtividade
        - micro
        - htop
        - tmux
        # Shell e prompt
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - starship
        # Tema VigiaOS
        - papirus-icon-theme       # icon theme dark
        - jetbrains-mono-fonts     # monospace base
        - gnome-tweaks

  # 3) Baixa JetBrainsMono Nerd Font (versao com glyphs Powerline) e instala em /usr/share/fonts/.
  - type: script
    scripts:
      - install-nerd-fonts.sh

  # 4) Compila os defaults dconf (dark mode, accent verde, wallpaper, fonte, icones).
  - type: script
    scripts:
      - setup-dconf.sh

  # 5) Flatpaks pre-instalados para todos os usuarios do sistema.
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.github.tchx84.Flatseal
      - scope: user
