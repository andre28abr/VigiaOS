[pytest]
# Configuracao do pytest para a suite Vigia
minversion = 7.0
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers customizados
markers =
    gtk: testes que requerem GTK4/PyGObject (skipped sem GI)
    needs_proc: testes que precisam de /proc (skipped fora de Linux)
    slow: testes lentos (mais de 1s)
    integration: testes de integracao com subprocess

# Comportamento
addopts =
    --strict-markers
    --tb=short
    -ra

# Filtros
filterwarnings =
    ignore::DeprecationWarning
